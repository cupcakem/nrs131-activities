<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetal Position Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: rgba(0,0,0,0.10);
    --border-med: rgba(0,0,0,0.18);
    --hover-bg: #e8e4de;
    --pool-bg: #f0ede8;
    --correct-bg: #edf7f3;
    --correct-text: #0d4a30;
    --correct-border: #1a8a5a;
    --wrong-bg: #fff0ee;
    --wrong-text: #7a1f10;
    --wrong-border: #c0392b;
    --selected-bg: #E6F1FB;
    --selected-border: #185FA5;
    --selected-text: #0C447C;
    --dot-done: #1a8a5a;
    --dot-active: #185FA5;
    --dot-empty: rgba(0,0,0,0.18);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }

  header {
    text-align: center;
    max-width: 720px;
    margin: 0 auto 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 0.6rem;
  }

  header p {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .main {
    max-width: 720px;
    margin: 0 auto;
  }

  .progress-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1.75rem;
  }

  .prog-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--dot-empty);
    transition: background 0.2s;
  }

  .prog-dot.done   { background: var(--dot-done); }
  .prog-dot.active { background: var(--dot-active); }

  .scenario-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem 2rem;
  }

  .sc-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .sc-desc {
    font-size: 16px;
    color: var(--text);
    line-height: 1.7;
    margin-bottom: 1.5rem;
  }

  .pelvis-svg {
    display: block;
    margin: 0 auto 1.5rem;
  }

  .builder-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .code-display {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .code-slot {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    border: 1.5px solid var(--border-med);
    background: var(--pool-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }

  .code-slot.filled {
    background: var(--surface);
    border-color: rgba(0,0,0,0.25);
  }

  .code-slot .slot-val {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .code-slot .slot-lbl {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .code-slot.result-slot {
    width: 80px;
  }

  .code-slot.result-slot .slot-val {
    font-size: 17px;
  }

  .code-sep {
    font-size: 22px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .btn-groups {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .btn-group-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .grp-label {
    font-size: 13px;
    color: var(--text-muted);
    min-width: 110px;
    flex-shrink: 0;
  }

  .opt-btn {
    padding: 8px 18px;
    border-radius: 999px;
    border: 1.5px solid var(--border-med);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
  }

  .opt-btn:hover { background: var(--hover-bg); }

  .opt-btn.selected {
    background: var(--selected-bg);
    border-color: var(--selected-border);
    color: var(--selected-text);
  }

  .action-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 9px 22px;
    border-radius: 999px;
    border: 1.5px solid var(--border-med);
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn:hover { background: var(--hover-bg); }

  .btn.primary {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }

  .btn.primary:hover { background: #333; }

  .feedback {
    display: none;
    margin-top: 1rem;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.7;
    border-left: 3px solid;
  }

  .feedback.correct {
    background: var(--correct-bg);
    color: var(--correct-text);
    border-color: var(--correct-border);
  }

  .feedback.wrong {
    background: var(--wrong-bg);
    color: var(--wrong-text);
    border-color: var(--wrong-border);
  }

  .feedback .fb-verdict {
    font-weight: 500;
    font-size: 15px;
    margin-bottom: 5px;
  }

  .nav-row {
    display: flex;
    margin-top: 1rem;
    gap: 10px;
  }

  .final-card {
    text-align: center;
    padding: 3rem 2rem;
  }

  .final-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .final-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 12px;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">In-class activity — Mechanics of Labor &amp; Delivery</div>
  <h1>Fetal position decoder</h1>
  <p>Read each scenario and use the pelvic diagram to build the correct 3-letter position code.</p>
</header>

<div class="main">
  <div class="progress-row" id="progress"></div>
  <div id="scenario-area"></div>
</div>

<footer>Mechanics of L&amp;D — Lecture 1 &nbsp;·&nbsp; L&amp;D Nursing</footer>

<script>
const scenarios = [
  {
    q: 1,
    desc: "The occiput is pointing toward the front-left of the maternal pelvis. This is the most common fetal position and the most favorable for vaginal delivery.",
    highlight: { side: "L", quadrant: "A" },
    presenting: "O",
    answer: "LOA",
    explanation: "Left Occiput Anterior (LOA) — the occiput (O) is on the left (L) side of the pelvis, in the anterior (A) position. This is the most favorable position for vaginal delivery as the smallest head diameter is presenting."
  },
  {
    q: 2,
    desc: "The occiput is pointing toward the back-right of the maternal pelvis. This position is associated with intense back labor and may slow progress.",
    highlight: { side: "R", quadrant: "P" },
    presenting: "O",
    answer: "ROP",
    explanation: "Right Occiput Posterior (ROP) — the occiput (O) is on the right (R) side, in the posterior (P) position. Posterior positions present a larger diameter and often cause severe back pain. Nursing interventions include hands-and-knees positioning to encourage rotation."
  },
  {
    q: 3,
    desc: "In a breech presentation, the sacrum is pointing toward the front-right of the maternal pelvis.",
    highlight: { side: "R", quadrant: "A" },
    presenting: "S",
    answer: "RSA",
    explanation: "Right Sacrum Anterior (RSA) — in breech presentations the sacrum (S) is the reference point. Here it is on the right (R), anteriorly (A) positioned. Remember: the reference landmark changes with the presenting part — occiput for vertex, sacrum for breech, mentum for face, scapula for shoulder."
  },
  {
    q: 4,
    desc: "The occiput is on the left side of the pelvis, pointing directly to the side — neither toward the front nor the back. This is common early in labor.",
    highlight: { side: "L", quadrant: "T" },
    presenting: "O",
    answer: "LOT",
    explanation: "Left Occiput Transverse (LOT) — the occiput (O) is on the left (L), in the transverse (T) position. Transverse positions are common at the start of active labor and typically rotate to anterior as the baby descends through the pelvis."
  },
  {
    q: 5,
    desc: "In a face presentation, the mentum (chin) is pointing toward the back-left of the maternal pelvis. This position typically requires cesarean delivery.",
    highlight: { side: "L", quadrant: "P" },
    presenting: "M",
    answer: "LMP",
    explanation: "Left Mentum Posterior (LMP) — in face presentations the mentum/chin (M) is the reference point. Here it is on the left (L), posteriorly (P) positioned. Mentum posterior cannot deliver vaginally because the head cannot extend further to fit under the pubic arch — cesarean section is required."
  },
  {
    q: 6,
    desc: "The occiput is pointing toward the front-right of the maternal pelvis.",
    highlight: { side: "R", quadrant: "A" },
    presenting: "O",
    answer: "ROA",
    explanation: "Right Occiput Anterior (ROA) — the occiput (O) is on the right (R) side, anteriorly (A) positioned. Like LOA, this is a favorable position for vaginal delivery. ROA is the second most common position after LOA."
  },
];

let current = 0;
let selections = {};
let answered = false;

function buildSVG(highlight) {
  const { side, quadrant } = highlight;
  // Correct anatomical orientation — deliverer's view, patient supine:
  //   Anterior (pubic symphysis) = TOP of diagram
  //   Posterior (sacrum)         = BOTTOM of diagram
  //   Mother's LEFT              = viewer's RIGHT (cx > 150)
  //   Mother's RIGHT             = viewer's LEFT  (cx < 150)
  // Transverse positions sit at the widest equator, mid-height
  const cx = 150;
  const cy = 125;
  const qMap = {
    "LA": { px: 188, py: 80  },  // mother's left, anterior
    "RA": { px: 112, py: 80  },  // mother's right, anterior
    "LP": { px: 188, py: 170 },  // mother's left, posterior
    "RP": { px: 112, py: 170 },  // mother's right, posterior
    "LT": { px: 215, py: 125 },  // mother's left, transverse (widest point)
    "RT": { px: 85,  py: 125 },  // mother's right, transverse
  };
  const key = side + quadrant;
  const pt = qMap[key] || { px: 150, py: 125 };

  return `<svg class="pelvis-svg" width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
    <!-- Pelvic inlet outline (wider than tall, typical inlet shape) -->
    <ellipse cx="150" cy="125" rx="90" ry="75" fill="none" stroke="#cccccc" stroke-width="1.5"/>
    <!-- Dividing lines -->
    <line x1="150" y1="50"  x2="150" y2="200" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="60"  y1="125" x2="240" y2="125" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Anterior label (top) -->
    <text x="150" y="38"  font-size="11" fill="#888" text-anchor="middle" font-family="DM Sans, sans-serif">Anterior (pubic symphysis)</text>
    <!-- Posterior label (bottom) -->
    <text x="150" y="222" font-size="11" fill="#888" text-anchor="middle" font-family="DM Sans, sans-serif">Posterior (sacrum)</text>
    <!-- Mother's left = viewer's right -->
    <text x="256" y="122" font-size="11" fill="#888" text-anchor="middle" font-family="DM Sans, sans-serif">Pt L</text>
    <!-- Mother's right = viewer's left -->
    <text x="44"  y="122" font-size="11" fill="#888" text-anchor="middle" font-family="DM Sans, sans-serif">Pt R</text>
    <!-- Highlighted position dot -->
    <circle cx="${pt.px}" cy="${pt.py}" r="18" fill="#E6F1FB" stroke="#185FA5" stroke-width="2"/>
    <circle cx="${pt.px}" cy="${pt.py}" r="5"  fill="#185FA5"/>
    <!-- Caption -->
    <text x="150" y="246" font-size="10" fill="#aaa" text-anchor="middle" font-family="DM Sans, sans-serif">Pelvic inlet — deliverer's view, patient supine</text>
  </svg>`;
}

function renderProgress() {
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  scenarios.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'prog-dot' + (i < current ? ' done' : i === current ? ' active' : '');
    prog.appendChild(dot);
  });
}

function renderScenario() {
  answered = false;
  selections = { side: null, part: null, loc: null };
  const s = scenarios[current];
  const area = document.getElementById('scenario-area');
  area.innerHTML = `
    <div class="scenario-card">
      <div class="sc-eyebrow">Scenario ${s.q} of ${scenarios.length}</div>
      <div class="sc-desc">${s.desc}</div>
      ${buildSVG(s.highlight)}

      <div class="builder-label">Build the position code</div>
      <div class="code-display">
        <div class="code-slot" id="slot-side">
          <span class="slot-val" id="val-side">?</span>
          <span class="slot-lbl">Side</span>
        </div>
        <div class="code-sep">+</div>
        <div class="code-slot" id="slot-part">
          <span class="slot-val" id="val-part">?</span>
          <span class="slot-lbl">Part</span>
        </div>
        <div class="code-sep">+</div>
        <div class="code-slot" id="slot-loc">
          <span class="slot-val" id="val-loc">?</span>
          <span class="slot-lbl">Location</span>
        </div>
        <div class="code-sep">=</div>
        <div class="code-slot result-slot" id="slot-full">
          <span class="slot-val" id="val-full">???</span>
          <span class="slot-lbl">Position</span>
        </div>
      </div>

      <div class="btn-groups">
        <div class="btn-group-row">
          <span class="grp-label">1. Side (R/L)</span>
          <button class="opt-btn" data-group="side" onclick="pick(this,'side','R')">R — Right</button>
          <button class="opt-btn" data-group="side" onclick="pick(this,'side','L')">L — Left</button>
        </div>
        <div class="btn-group-row">
          <span class="grp-label">2. Presenting part</span>
          <button class="opt-btn" data-group="part" onclick="pick(this,'part','O')">O — Occiput</button>
          <button class="opt-btn" data-group="part" onclick="pick(this,'part','M')">M — Mentum</button>
          <button class="opt-btn" data-group="part" onclick="pick(this,'part','S')">S — Sacrum</button>
          <button class="opt-btn" data-group="part" onclick="pick(this,'part','Sc')">Sc — Scapula</button>
        </div>
        <div class="btn-group-row">
          <span class="grp-label">3. Location</span>
          <button class="opt-btn" data-group="loc" onclick="pick(this,'loc','A')">A — Anterior</button>
          <button class="opt-btn" data-group="loc" onclick="pick(this,'loc','P')">P — Posterior</button>
          <button class="opt-btn" data-group="loc" onclick="pick(this,'loc','T')">T — Transverse</button>
        </div>
      </div>

      <div class="action-row">
        <button class="btn primary" onclick="checkAnswer()">Check answer</button>
        <button class="btn" onclick="resetPicks()">Clear</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <div class="nav-row" id="nav-row">
        ${current < scenarios.length - 1
          ? `<button class="btn primary" onclick="nextQ()">Next scenario</button>`
          : `<button class="btn primary" onclick="showFinal()">See results</button>`}
      </div>
    </div>`;
  renderProgress();
}

function pick(btn, group, val) {
  if (answered) return;
  document.querySelectorAll(`.opt-btn[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selections[group] = val;
  const slotKey = group;
  document.getElementById('val-' + slotKey).textContent = val;
  document.getElementById('slot-' + slotKey).classList.add('filled');
  updateFull();
}

function updateFull() {
  const { side, part, loc } = selections;
  const full = (side || '?') + (part || '?') + (loc || '?');
  document.getElementById('val-full').textContent = full;
  if (side && part && loc) document.getElementById('slot-full').classList.add('filled');
}

function resetPicks() {
  if (answered) return;
  selections = { side: null, part: null, loc: null };
  document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
  ['side','part','loc'].forEach(k => {
    document.getElementById('val-' + k).textContent = '?';
    document.getElementById('slot-' + k).classList.remove('filled');
  });
  document.getElementById('val-full').textContent = '???';
  document.getElementById('slot-full').classList.remove('filled');
  document.getElementById('feedback').style.display = 'none';
}

function checkAnswer() {
  const { side, part, loc } = selections;
  const fb = document.getElementById('feedback');
  if (!side || !part || !loc) {
    fb.className = 'feedback wrong';
    fb.style.display = 'block';
    fb.innerHTML = '<div class="fb-verdict">Select one option from each row first.</div>';
    return;
  }
  const guess = side + part + loc;
  const s = scenarios[current];
  const right = guess === s.answer;
  answered = true;
  fb.className = 'feedback ' + (right ? 'correct' : 'wrong');
  fb.style.display = 'block';
  fb.innerHTML = `<div class="fb-verdict">${right ? 'Correct! ' + s.answer : 'Not quite — the answer is ' + s.answer}</div>${s.explanation}`;

}

function nextQ() { current++; renderScenario(); }

function showFinal() {
  document.getElementById('scenario-area').innerHTML = `
    <div class="scenario-card final-card">
      <div class="final-title">All done!</div>
      <div class="final-sub">You worked through all ${scenarios.length} position scenarios.</div>
      <button class="btn primary" onclick="current=0; renderScenario()">Start over</button>
    </div>`;
  renderProgress();
}

renderScenario();
</script>
</body>
</html>
